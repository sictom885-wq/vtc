  <rect x="292" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="308" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="324" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="338" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>

  <!-- TOUR GAUCHE -->
  <rect x="44" y="104" width="44" height="96" fill="none" stroke="url(#g-or-c)" stroke-width="1.4" filter="url(#glow-c)"/>
  <!-- Toiture tour gauche -->
  <path d="M44 104 L66 74 L88 104Z" fill="none" stroke="url(#g-or-c)" stroke-width="1.4" filter="url(#glow-c)"/>
  <!-- Créneaux tour gauche -->
  <rect x="48"  y="95" width="8" height="10" fill="none" stroke="url(#g-or-c)" stroke-width="0.9"/>
  <rect x="60"  y="95" width="8" height="10" fill="none" stroke="url(#g-or-c)" stroke-width="0.9"/>
  <rect x="72"  y="95" width="8" height="10" fill="none" stroke="url(#g-or-c)" stroke-width="0.9"/>
  <!-- Porte arcades tour gauche -->
  <path d="M57 200 L57 175 Q66 162 75 175 L75 200Z" fill="none" stroke="#C9A84C" stroke-width="0.9"/>
  <!-- Fenêtres tour gauche -->
  <path d="M54 130 L54 116 Q66 108 78 116 L78 130Z" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.7"/>
  <rect x="55" y="143" width="22" height="13" rx="1" fill="#C9A84C" fill-opacity="0.06" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>

  <!-- TOUR CENTRALE IMPOSANTE -->
  <rect x="168" y="72" width="64" height="128" fill="none" stroke="url(#g-or-c)" stroke-width="1.8" filter="url(#glow-c)"/>
  <!-- Toiture conique centrale -->
  <path d="M168 72 L200 32 L232 72Z" fill="none" stroke="url(#g-or-c)" stroke-width="1.8" filter="url(#glow-c)"/>
