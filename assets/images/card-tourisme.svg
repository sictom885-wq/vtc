  <path d="M322 134 L322 120 Q334 112 346 120 L346 134Z" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.7"/>
  <rect x="322" y="148" width="22" height="13" rx="1" fill="#C9A84C" fill-opacity="0.06" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>

  <!-- TOUR SECONDAIRE GAUCHE INTERMÉDIAIRE -->
  <rect x="106" y="118" width="36" height="82" fill="none" stroke="url(#g-or-c)" stroke-width="1.2"/>
  <path d="M106 118 L124 96 L142 118Z" fill="none" stroke="url(#g-or-c)" stroke-width="1.2"/>
  <rect x="110" y="110" width="7" height="9" fill="none" stroke="#C9A84C" stroke-width="0.7"/>
  <rect x="120" y="110" width="7" height="9" fill="none" stroke="#C9A84C" stroke-width="0.7"/>
  <rect x="130" y="110" width="7" height="9" fill="none" stroke="#C9A84C" stroke-width="0.7"/>
  <path d="M115 200 L115 180 Q124 170 133 180 L133 200Z" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
  <path d="M113 143 L113 131 Q124 124 135 131 L135 143Z" fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.6"/>

  <!-- TOUR SECONDAIRE DROITE INTERMÉDIAIRE -->
  <rect x="258" y="122" width="36" height="78" fill="none" stroke="url(#g-or-c)" stroke-width="1.2"/>
  <path d="M258 122 L276 100 L294 122Z" fill="none" stroke="url(#g-or-c)" stroke-width="1.2"/>
  <rect x="262" y="114" width="7" height="9" fill="none" stroke="#C9A84C" stroke-width="0.7"/>
  <rect x="272" y="114" width="7" height="9" fill="none" stroke="#C9A84C" stroke-width="0.7"/>
  <rect x="282" y="114" width="7" height="9" fill="none" stroke="#C9A84C" stroke-width="0.7"/>
  <path d="M265 200 L265 181 Q276 171 287 181 L287 200Z" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
  <path d="M263 147 L263 135 Q276 128 289 135 L289 147Z" fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.6"/>

  <!-- Lueur or sous les murs -->
  <ellipse cx="200" cy="202" rx="150" ry="7" fill="#C9A84C" fill-opacity="0.05"/>

  <!-- Étoiles / ciel -->
  <circle cx="40"  cy="40"  r="1"   fill="#E2C97E" opacity="0.3"/>
  <circle cx="80"  cy="25"  r="0.8" fill="#E2C97E" opacity="0.25"/>
  <circle cx="140" cy="35"  r="1.2" fill="#E2C97E" opacity="0.35"/>
  <circle cx="260" cy="28"  r="0.8" fill="#E2C97E" opacity="0.2"/>
  <circle cx="320" cy="44"  r="1"   fill="#E2C97E" opacity="0.3"/>
  <circle cx="370" cy="22"  r="0.8" fill="#E2C97E" opacity="0.25"/>
  <circle cx="360" cy="55"  r="1.2" fill="#E2C97E" opacity="0.2"/>

  <!-- Coins décoratifs -->
  <line x1="20" y1="20" x2="48" y2="20" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="20" x2="20" y2="48" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="380" y1="20" x2="352" y2="20" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="380" y1="20" x2="380" y2="48" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="260" x2="48" y2="260" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="260" x2="20" y2="232" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="380" y1="260" x2="352" y2="260" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="380" y1="260" x2="380" y2="232" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
</svg>
