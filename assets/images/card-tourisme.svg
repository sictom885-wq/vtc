  <rect x="172" y="62" width="9" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1.1"/>
  <rect x="185" y="62" width="9" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1.1"/>
  <rect x="198" y="62" width="9" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1.1"/>
  <rect x="211" y="62" width="9" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1.1"/>
  <rect x="222" y="62" width="9" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1.1"/>
  <!-- Grande porte plein cintre -->
  <path d="M184 200 L184 162 Q200 144 216 162 L216 200Z" fill="none" stroke="#C9A84C" stroke-width="1.1"/>
  <!-- Fenêtre centrale ogivale principale -->
  <path d="M186 118 L186 94 Q200 82 214 94 L214 118Z" fill="none" stroke="#C9A84C" stroke-width="0.9" opacity="0.8"/>
  <!-- Rose window -->
  <circle cx="200" cy="106" r="6" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <!-- Fenêtres hautes -->
  <path d="M175 145 L175 133 Q181 126 187 133 L187 145Z" fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.55"/>
  <path d="M213 145 L213 133 Q219 126 225 133 L225 145Z" fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.55"/>

  <!-- TOUR DROITE -->
  <rect x="312" y="108" width="44" height="92" fill="none" stroke="url(#g-or-c)" stroke-width="1.4" filter="url(#glow-c)"/>
  <!-- Toiture tour droite -->
  <path d="M312 108 L334 78 L356 108Z" fill="none" stroke="url(#g-or-c)" stroke-width="1.4" filter="url(#glow-c)"/>
  <!-- Créneaux tour droite -->
  <rect x="316" y="99" width="8" height="10" fill="none" stroke="url(#g-or-c)" stroke-width="0.9"/>
  <rect x="328" y="99" width="8" height="10" fill="none" stroke="url(#g-or-c)" stroke-width="0.9"/>
  <rect x="340" y="99" width="8" height="10" fill="none" stroke="url(#g-or-c)" stroke-width="0.9"/>
  <!-- Porte tour droite -->
  <path d="M323 200 L323 177 Q334 164 345 177 L345 200Z" fill="none" stroke="#C9A84C" stroke-width="0.9"/>
