<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img" aria-label="Tourisme Occitanie — Cité de Carcassonne line-art or">
  <defs>
    <linearGradient id="g-or-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2C97E"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <filter id="glow-c" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="400" height="280" fill="#080810"/>

  <!-- Colline / terrain -->
  <path d="M0 220 Q100 200 200 196 Q300 192 400 210 L400 280 L0 280Z"
        fill="#0D0D1A" stroke="#C9A84C" stroke-width="0.4" opacity="0.6"/>

  <!-- MURAILLE PRINCIPALE -->
  <rect x="48" y="148" width="304" height="52" fill="none" stroke="url(#g-or-c)" stroke-width="1.5" filter="url(#glow-c)"/>

  <!-- Créneaux muraille principale -->
  <rect x="52"  y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="68"  y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="84"  y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="100" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="116" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="132" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="148" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="164" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="180" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="196" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="212" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="228" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="244" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
  <rect x="260" y="138" width="10" height="12" fill="none" stroke="url(#g-or-c)" stroke-width="1"/>
