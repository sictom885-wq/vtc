<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img" aria-label="Transferts aéroport — illustration avion line-art or">
  <defs>
    <linearGradient id="g-or-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2C97E"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <filter id="glow-a" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="400" height="280" fill="#080810"/>
  <!-- Grille subtile -->
  <line x1="0" y1="240" x2="400" y2="240" stroke="#C9A84C" stroke-width="0.4" opacity="0.2"/>
  <line x1="200" y1="0" x2="200" y2="280" stroke="#C9A84C" stroke-width="0.3" opacity="0.08"/>

  <!-- Avion — corps fuselage -->
  <path d="M200 60 C200 60 238 88 248 114 L248 168 L232 162 L232 114 C232 114 200 88 168 114 L168 162 L152 168 L152 114 C162 88 200 60 200 60Z"
        fill="none" stroke="url(#g-or-a)" stroke-width="1.6" filter="url(#glow-a)" stroke-linejoin="round"/>

  <!-- Aile gauche -->
  <path d="M152 128 L100 166 L107 173 L168 152" fill="none" stroke="url(#g-or-a)" stroke-width="1.6" filter="url(#glow-a)" stroke-linejoin="round"/>
  <!-- Aile droite -->
  <path d="M248 128 L300 166 L293 173 L232 152" fill="none" stroke="url(#g-or-a)" stroke-width="1.6" filter="url(#glow-a)" stroke-linejoin="round"/>

  <!-- Dérive verticale -->
  <path d="M198 60 L190 34 L210 34 L202 60" fill="none" stroke="url(#g-or-a)" stroke-width="1.3" filter="url(#glow-a)"/>

  <!-- Stabilisateurs horizontaux -->
  <path d="M152 162 L132 150 L137 147 L168 157" fill="none" stroke="url(#g-or-a)" stroke-width="1.2"/>
  <path d="M248 162 L268 150 L263 147 L232 157" fill="none" stroke="url(#g-or-a)" stroke-width="1.2"/>

  <!-- Hublots -->
  <circle cx="180" cy="136" r="5" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.75"/>
  <circle cx="200" cy="133" r="5" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.75"/>
  <circle cx="220" cy="136" r="5" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.75"/>

  <!-- Réacteurs -->
  <ellipse cx="148" cy="148" rx="10" ry="5" fill="none" stroke="#C9A84C" stroke-width="0.9" opacity="0.5"/>
  <ellipse cx="252" cy="148" rx="10" ry="5" fill="none" stroke="#C9A84C" stroke-width="0.9" opacity="0.5"/>

  <!-- Piste de décollage -->
  <line x1="80" y1="200" x2="320" y2="200" stroke="#C9A84C" stroke-width="0.6" opacity="0.35"/>
  <!-- Marquages piste -->
  <line x1="156" y1="198" x2="156" y2="206" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="198" x2="180" y2="206" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="198" x2="200" y2="206" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="220" y1="198" x2="220" y2="206" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="244" y1="198" x2="244" y2="206" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <!-- Axe piste tirets -->
  <line x1="120" y1="202" x2="140" y2="202" stroke="#C9A84C" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="170" y1="202" x2="190" y2="202" stroke="#C9A84C" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="210" y1="202" x2="230" y2="202" stroke="#C9A84C" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="260" y1="202" x2="280" y2="202" stroke="#C9A84C" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Lueur sol -->
  <ellipse cx="200" cy="204" rx="90" ry="6" fill="#C9A84C" fill-opacity="0.04"/>

  <!-- Coin décoratif -->
  <line x1="20" y1="20" x2="48" y2="20" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="20" x2="20" y2="48" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="380" y1="20" x2="352" y2="20" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="380" y1="20" x2="380" y2="48" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="260" x2="48" y2="260" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="260" x2="20" y2="232" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="380" y1="260" x2="352" y2="260" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="380" y1="260" x2="380" y2="232" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
</svg>
