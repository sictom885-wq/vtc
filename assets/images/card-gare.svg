<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img" aria-label="Transferts gare — illustration train line-art or">
  <defs>
    <linearGradient id="g-or-t" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2C97E"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <filter id="glow-t" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="400" height="280" fill="#080810"/>

  <!-- Caténaire électrique (fils) -->
  <path d="M50 48 Q200 38 350 48" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.25" stroke-dasharray="none"/>
  <line x1="120" y1="48" x2="120" y2="68" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="43" x2="200" y2="68" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
  <line x1="280" y1="48" x2="280" y2="68" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>

  <!-- Corps principal TGV -->
  <path d="M70 120 L70 86 Q72 82 78 82 L310 82 Q340 82 355 96 L360 120Z"
        fill="none" stroke="url(#g-or-t)" stroke-width="1.6" filter="url(#glow-t)" stroke-linejoin="round"/>

  <!-- Nez avant profilé (droite) -->
  <path d="M310 82 Q340 82 355 96 L360 120 L355 122 Q348 108 316 108 L310 82" fill="none" stroke="url(#g-or-t)" stroke-width="0.8" opacity="0.5"/>

  <!-- Bas de caisse -->
  <line x1="70" y1="120" x2="360" y2="120" stroke="url(#g-or-t)" stroke-width="1.4" filter="url(#glow-t)"/>

  <!-- Vitres passagers -->
  <rect x="80"  y="90" width="22" height="16" rx="2" fill="#C9A84C" fill-opacity="0.07" stroke="#C9A84C" stroke-width="0.8"/>
  <rect x="110" y="90" width="22" height="16" rx="2" fill="#C9A84C" fill-opacity="0.07" stroke="#C9A84C" stroke-width="0.8"/>
  <rect x="140" y="90" width="22" height="16" rx="2" fill="#C9A84C" fill-opacity="0.07" stroke="#C9A84C" stroke-width="0.8"/>
  <rect x="170" y="90" width="22" height="16" rx="2" fill="#C9A84C" fill-opacity="0.07" stroke="#C9A84C" stroke-width="0.8"/>
  <rect x="200" y="90" width="22" height="16" rx="2" fill="#C9A84C" fill-opacity="0.07" stroke="#C9A84C" stroke-width="0.8"/>
  <rect x="230" y="90" width="22" height="16" rx="2" fill="#C9A84C" fill-opacity="0.07" stroke="#C9A84C" stroke-width="0.8"/>
  <rect x="260" y="90" width="22" height="16" rx="2" fill="#C9A84C" fill-opacity="0.07" stroke="#C9A84C" stroke-width="0.8"/>

  <!-- Vitre cabine conducteur -->
  <rect x="318" y="88" width="28" height="18" rx="3" fill="#C9A84C" fill-opacity="0.12" stroke="#E2C97E" stroke-width="0.9"/>

  <!-- Phare avant -->
  <circle cx="356" cy="106" r="5" fill="none" stroke="#E2C97E" stroke-width="1.1" opacity="0.9"/>
  <line x1="361" y1="106" x2="374" y2="104" stroke="#E2C97E" stroke-width="0.8" opacity="0.4"/>
  <line x1="362" y1="109" x2="375" y2="109" stroke="#E2C97E" stroke-width="0.6" opacity="0.3"/>

  <!-- Liason pantographe -->
  <path d="M200 68 L192 78 M200 68 L208 78" fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.35"/>
  <line x1="186" y1="78" x2="214" y2="78" stroke="#C9A84C" stroke-width="0.7" opacity="0.35"/>

  <!-- Roues boggies -->
  <circle cx="118" cy="140" r="12" fill="none" stroke="url(#g-or-t)" stroke-width="1.5" filter="url(#glow-t)"/>
  <circle cx="118" cy="140" r="5"  fill="none" stroke="#C9A84C" stroke-width="0.8"/>
  <circle cx="118" cy="140" r="1.5" fill="#C9A84C" opacity="0.6"/>
  <!-- Rayons roue gauche -->
  <line x1="118" y1="128" x2="118" y2="135" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="118" y1="145" x2="118" y2="152" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="106" y1="140" x2="113" y2="140" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="123" y1="140" x2="130" y2="140" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>

  <circle cx="210" cy="140" r="12" fill="none" stroke="url(#g-or-t)" stroke-width="1.5" filter="url(#glow-t)"/>
  <circle cx="210" cy="140" r="5"  fill="none" stroke="#C9A84C" stroke-width="0.8"/>
  <circle cx="210" cy="140" r="1.5" fill="#C9A84C" opacity="0.6"/>
  <line x1="210" y1="128" x2="210" y2="135" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="210" y1="145" x2="210" y2="152" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="198" y1="140" x2="205" y2="140" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="215" y1="140" x2="222" y2="140" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>

  <circle cx="310" cy="140" r="12" fill="none" stroke="url(#g-or-t)" stroke-width="1.5" filter="url(#glow-t)"/>
  <circle cx="310" cy="140" r="5"  fill="none" stroke="#C9A84C" stroke-width="0.8"/>
  <circle cx="310" cy="140" r="1.5" fill="#C9A84C" opacity="0.6"/>
  <line x1="310" y1="128" x2="310" y2="135" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="310" y1="145" x2="310" y2="152" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="298" y1="140" x2="305" y2="140" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="315" y1="140" x2="322" y2="140" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>

  <!-- Rails -->
  <line x1="30" y1="156" x2="380" y2="156" stroke="#C9A84C" stroke-width="1.4" opacity="0.55"/>
  <line x1="30" y1="162" x2="380" y2="162" stroke="#C9A84C" stroke-width="1.4" opacity="0.55"/>

  <!-- Traverses -->
  <line x1="55"  y1="154" x2="55"  y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>
  <line x1="80"  y1="154" x2="80"  y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>
  <line x1="105" y1="154" x2="105" y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>
  <line x1="130" y1="154" x2="130" y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>
  <line x1="155" y1="154" x2="155" y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>
  <line x1="180" y1="154" x2="180" y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>
  <line x1="205" y1="154" x2="205" y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>
  <line x1="230" y1="154" x2="230" y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>
  <line x1="255" y1="154" x2="255" y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>
  <line x1="280" y1="154" x2="280" y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>
  <line x1="305" y1="154" x2="305" y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>
  <line x1="330" y1="154" x2="330" y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>
  <line x1="355" y1="154" x2="355" y2="165" stroke="#C9A84C" stroke-width="1.2" opacity="0.3"/>

  <!-- Lueur sol -->
  <ellipse cx="200" cy="163" rx="140" ry="6" fill="#C9A84C" fill-opacity="0.04"/>

  <!-- Coins décoratifs -->
  <line x1="20" y1="20" x2="48" y2="20" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="20" x2="20" y2="48" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="380" y1="20" x2="352" y2="20" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="380" y1="20" x2="380" y2="48" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="260" x2="48" y2="260" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="260" x2="20" y2="232" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="380" y1="260" x2="352" y2="260" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line x1="380" y1="260" x2="380" y2="232" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
</svg>
